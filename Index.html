<!DOCTYPE html>
<html>
  <head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      body { background: #f3f4f6; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }

  <body class="min-h-screen flex items-center justify-center p-6">

      <div class="grid grid-cols-1 gap-4">
        
        <a href="https://andesnice.app.n8n.cloud/form/09740b99-9402-42eb-b6c3-f468d538ea12" target="_blank" 
           class="card-hover block p-6 bg-white rounded-xl shadow-md border-l-4 border-orange-500">

            <div class="p-3 bg-orange-100 rounded-full text-orange-600">
              <i class="fa-solid fa-file-signature text-xl"></i>
            </div>
            <div class="ml-4">
              <h3 class="text-lg font-bold text-gray-800">填寫 n8n 表單</h3>

            </div>

              <i class="fa-solid fa-earth-americas text-xl"></i>
            </div>

      <div class="text-center text-xs text-gray-400 mt-8">

      </div>
    </div>
